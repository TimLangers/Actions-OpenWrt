name: OpenWrt-x86_64-Build

on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * *'

env:
  REPO_URL: https://github.com/openwrt/openwrt.git
  REPO_BRANCH: openwrt-25.12
  CONFIG_FILE: OK2.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  TZ: Asia/Shanghai
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: 1️⃣ 拉取 OpenWrt 源码
      uses: actions/checkout@v4
      with:
        repository: openwrt/openwrt
        ref: ${{ env.REPO_BRANCH }}
        path: openwrt

    - name: 2️⃣ 拉取当前仓库配置脚本
      uses: actions/checkout@v4
      with:
        path: custom_repo

    - name: 3️⃣ 发送【开始】通知
      run: |
        MSG="🚀 <b>OpenWrt 编译开始</b>"
        PAYLOAD=$(jq -n --arg chat_id "${TELEGRAM_CHAT_ID}" --arg text "$MSG" '{chat_id: $chat_id, text: $text, parse_mode: "HTML"}')
        curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" -d "$PAYLOAD" || true

    - name: 4️⃣ 安装编译环境
      run: |
        sudo apt-get update
        sudo apt-get install -y ccache jq build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-distutils rsync unzip zlib1g-dev swig libelf-dev
        echo "FILE_DATE=$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: 5️⃣ 准备配置
      run: |
        cd openwrt
        # 从 custom_repo 复制文件到 openwrt 目录内
        cp ../custom_repo/${{ env.CONFIG_FILE }} .config
        
        # 处理 DIY 脚本
        [ -f ../custom_repo/$DIY_P1_SH ] && cp ../custom_repo/$DIY_P1_SH . && chmod +x $DIY_P1_SH && ./$DIY_P1_SH
        
        # 验证平台配置
        grep "CONFIG_TARGET_x86_64=y" .config || (echo "错误: 配置未包含 x86_64" && exit 1)
        
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
        [ -f ../custom_repo/$DIY_P2_SH ] && cp ../custom_repo/$DIY_P2_SH . && chmod +x $DIY_P2_SH && ./$DIY_P2_SH
        make defconfig

    - name: 6️⃣ 启用缓存
      uses: actions/cache@v4
      with:
        path: |
          openwrt/dl
          ~/.ccache
        key: ${{ runner.os }}-openwrt-x86_64-${{ hashFiles('custom_repo/OK2.config') }}
        restore-keys: |
          ${{ runner.os }}-openwrt-x86_64-

    - name: 7️⃣ 编译固件
      id: compile
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 8️⃣ 发送【结果】通知
      if: always()
      run: |
        STATUS=$([[ "${{ steps.compile.outputs.status }}" == "success" ]] && echo "✅ 成功" || echo "❌ 失败")
        MSG="${STATUS} 🔗 <a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'>查看日志</a>"
        PAYLOAD=$(jq -n --arg chat_id "${TELEGRAM_CHAT_ID}" --arg text "$MSG" '{chat_id: $chat_id, text: $text, parse_mode: "HTML"}')
        curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" -d "$PAYLOAD" || true

    - name: 9️⃣ 上传 x86/64 固件
      if: steps.compile.outputs.status == 'success'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: OpenWrt_x86_64_${{ env.FILE_DATE }}
        files: openwrt/bin/targets/x86/64/*-generic-squashfs-combined-efi.img.gz
