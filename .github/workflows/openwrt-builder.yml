name: OpenWrt-合集版 (最优加速通知完美整合版)

on:
  workflow_dispatch:
  schedule:
    # 每天北京时间 00:00 开始编译 (对应 UTC 时间 16:00)
    - cron: '0 16 * * *'

env:
  REPO_URL: https://github.com/openwrt/openwrt.git
  REPO_BRANCH: openwrt-25.12
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: OK2.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: 1️⃣ 拉取项目分支
      uses: actions/checkout@v4

    - name: 2️⃣ 清理磁盘空间
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true        
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        swap-storage: true

    - name: 3️⃣ 查看机器配置与安装 ccache
      id: machine_info
      run: |
        sudo apt-get update
        sudo apt-get install -y ccache jq
        echo "警告⚠"
        echo "分配的服务器性能有限，若选择的插件过多，务必注意CPU性能！"
        echo -e "CPU性能排序: 7763 > 8370C > 8272CL > 8171M > E5-2673\n"
        echo "--------------------------CPU信息--------------------------"
        CPU_PHYSICAL=$(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)
        CPU_CORES=$(nproc)
        CPU_MODEL=$(cat /proc/cpuinfo | grep -m1 name | awk -F: '{print $2}' | sed 's/^[ \t]*//')
        echo "CPU物理数量: $CPU_PHYSICAL"
        echo "CPU核心数量: $CPU_CORES"
        echo -e "CPU型号信息:$CPU_MODEL\n"
        echo "--------------------------内存信息--------------------------"
        MEM_INFO=$(free -h | awk '/^Mem:/ {print $2}')
        echo "内存总大小: $MEM_INFO"
        echo "--------------------------硬盘信息--------------------------"
        DISK_COUNT=$(ls /dev/sd* | grep -v [1-9] | wc -l)
        DISK_USAGE=$(df -hT)
        echo "硬盘数量: $DISK_COUNT" && echo "$DISK_USAGE"
        echo "CPU_PHYSICAL=$CPU_PHYSICAL" >> $GITHUB_ENV
        echo "CPU_CORES=$CPU_CORES" >> $GITHUB_ENV
        echo "CPU_MODEL=$CPU_MODEL" >> $GITHUB_ENV
        echo "MEM_INFO=$MEM_INFO" >> $GITHUB_ENV
        echo "FILE_DATE=$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: 4️⃣ 安装全量编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev jq
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: 5️⃣ 拦截并配置编译缓存 (最优提速核心)
      uses: actions/cache@v4
      with:
        path: |
          /workdir/openwrt/dl
          ~/.ccache
        key: ${{ runner.os }}-openwrt-cache-${{ hashFiles('**/feeds.conf.default', '**/*.config') }}
        restore-keys: |
          ${{ runner.os }}-openwrt-cache-

    - name: 6️⃣ 发送【编译开始】通知 (已重构为高稳定性 HTML)
      run: |
        # 完美吸纳你的排版，转译为 HTML 语法，彻底消除下划线引发的 TG 400 报错
        read -r -d '' MSG << EOF || true
        🚀 <b>OpenWrt 编译开始</b> 🚀

        📅 <b>时间</b>：$(date '+%Y-%m-%d %H:%M:%S')
        📦 <b>仓库名称</b>：${{ github.repository }}
        🖥️ <b>编译服务器信息</b>：
          • CPU：${{ env.CPU_MODEL }}
          • 物理数量：${{ env.CPU_PHYSICAL }}
          • 核心数：${{ env.CPU_CORES }}
          • 内存：${{ env.MEM_INFO }}
          • 磁盘使用：$(df -h / | awk 'NR==2 {print $4}') 可用

        📦 <b>配置文件</b>：${{ env.CONFIG_FILE }}
        🔧 <b>源码分支</b>：${{ env.REPO_BRANCH }}

        编译进行中，请稍候...
        🔗 <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">点击查看实时编译进度</a>
        EOF

        JSON_PAYLOAD=$(jq -n \
          --arg chat_id "${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          --arg text "$MSG" \
          --argjson preview false \
          '{
            chat_id: $chat_id, 
            text: $text, 
            parse_mode: "HTML", 
            disable_web_page_preview: $preview
          }')

        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
          -H "Content-Type: application/json" \
          -d "$JSON_PAYLOAD" || true

    - name: 7️⃣ 克隆固件源码
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: 8️⃣ 加载自定义 feeds & DIY 脚本 1
      run: |
        [ -e $FEEDS_CONF ] && cp $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: 9️⃣ 更新 & 安装 feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 🔟 加载自定义配置与 DIY 脚本 2 (注入缓存支持)
      run: |
        [ -e $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH
        
        # 强制在容器中限制缓存体积并写入底层缓存逻辑
        mkdir -p ~/.ccache
        echo "max_size = 4G" > ~/.ccache/ccache.conf
        echo "CONFIG_CCACHE=y" >> .config
        echo "CONFIG_CCACHE_DIR=\"/home/runner/.ccache\"" >> .config
        
        make defconfig

    - name: 1️⃣1️⃣ 下载编译依赖包 (利用缓存匹配)
      id: package
      run: |
        cd openwrt
        make download -j$(nproc)
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 1️⃣2️⃣ 核心编译步骤 (双层智能容错)
      id: compile
      run: |
        cd openwrt
        make tools/libtool/clean
        make tools/install -j1
        make toolchain/install -j1
        
        ccache -s
        echo -e "$(nproc) 线程快速编译中..."
        
        if make -j$(nproc); then
          echo "status=success" >> $GITHUB_OUTPUT
        else
          echo "⚠️ 多线程编译失败，正在尝试单线程 V=s 捕获核心错误并利用缓存降级补救..."
          ccache -z
          if make -j1 V=s; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            exit 1
          fi
        fi
        ccache -s

    - name: 1️⃣3️⃣ 整理并打包产物
      if: always()
      run: |
        mkdir -p $GITHUB_WORKSPACE/firmware
        if [ -d "openwrt/bin/targets/" ]; then
          find openwrt/bin/targets/ -type f \( -name "*.img.gz" -o -name "*.img" -o -name "*.bin" -o -name "*.tar" \) -exec cp {} $GITHUB_WORKSPACE/firmware/ \;
          echo "FIRMWARE=$GITHUB_WORKSPACE/firmware" >> $GITHUB_ENV
        else
          echo "警告: 未检测到输出目录！"
        fi

    - name: 1️⃣4️⃣ 发送【编译结果】通知 (Telegram 完美整合版)
      if: always()
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        if [ -f openwrt/.config ]; then
          DEVICE=$(grep '^CONFIG_TARGET.*DEVICE.*=y' openwrt/.config | sed -r 's/.*DEVICE_(.*)=y/\1/')
          [ -z "$DEVICE" ] && DEVICE="未知设备"
        else
          DEVICE="未知设备"
        fi

        # 完全采纳你包含管理地址、默认密码、设备、项目仓库的完整结束模板
        if [ "${{ steps.compile.outputs.status }}" = "success" ]; then
          FILE_DATE="${{ env.FILE_DATE }}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/OpenWrt_${FILE_DATE}"
          MSG=$(printf "✅ <b>OpenWrt 自动编译成功！</b> ✅\n\n📅 <b>完成时间</b>：%s\n📟 <b>目标设备</b>：%s\n📦 <b>项目仓库</b>：%s\n🌐 <b>管理地址</b>：10.1.1.1\n🔑 <b>默认密码</b>：无\n\n🔗 <a href=\"%s\">点击直达下载发布页面</a>\n⚠️ <a href=\"%s\">点击查看详细编译日志</a>" "$(date '+%Y-%m-%d %H:%M:%S')" "$DEVICE" "${{ github.repository }}" "$RELEASE_URL" "$RUN_URL")
        else
          MSG=$(printf "❌ <b>OpenWrt 自动编译失败！</b> ❌\n\n📅 <b>失败时间</b>：%s\n📟 <b>目标设备</b>：%s\n📦 <b>项目仓库</b>：%s\n🔧 <b>失败分支</b>：%s\n\n⚠️ <a href=\"%s\">点击此处紧急查看错误日志</a>" "$(date '+%Y-%m-%d %H:%M:%S')" "$DEVICE" "${{ github.repository }}" "${{ env.REPO_BRANCH }}" "$RUN_URL")
        fi

        JSON_PAYLOAD=$(jq -n \
          --arg chat_id "${TELEGRAM_CHAT_ID}" \
          --arg text "$MSG" \
          --argjson preview true \
          '{
            chat_id: $chat_id, 
            text: $text, 
            parse_mode: "HTML", 
            disable_web_page_preview: $preview
          }')

        RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
          -H "Content-Type: application/json" \
          -d "$JSON_PAYLOAD")
        
        echo "TG API Response: $RESPONSE"

    - name: 1️⃣5️⃣ 上传固件到 Releases
      uses: softprops/action-gh-release@v2
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true'
      with:
        tag_name: OpenWrt_${{ env.FILE_DATE }}
        name: OpenWrt 自动编译 ${{ env.FILE_DATE }}
        body: |
          🚀 OpenWrt 自动编译完成！
          📅 编译时间: ${{ env.FILE_DATE }}
          📟 设备配置: ${{ env.CONFIG_FILE }}
          🌿 源码分支: ${{ env.REPO_BRANCH }}
          🌐 默认管理地址: 10.1.1.1 (密码: 无)
          ⚡ 特性: 本次编译已受到 ccache 级物理加速支持
        files: ${{ env.FIRMWARE }}/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
