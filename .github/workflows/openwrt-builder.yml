name: OpenWrt-x86_64-Build

on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * *'

env:
  REPO_URL: https://github.com/openwrt/openwrt.git
  REPO_BRANCH: openwrt-25.12
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  TZ: Asia/Shanghai
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: 1️⃣ 拉取 OpenWrt 源码
      uses: actions/checkout@v4
      with:
        repository: openwrt/openwrt
        ref: ${{ env.REPO_BRANCH }}
        path: openwrt

    - name: 2️⃣ 拉取当前仓库文件
      uses: actions/checkout@v4
      with:
        path: custom_repo

    - name: 3️⃣ Telegram 开始通知
      run: |
        MSG="🚀 <b>OpenWrt 编译开始</b>"
        PAYLOAD=$(jq -n --arg chat_id "${TELEGRAM_CHAT_ID}" --arg text "$MSG" '{chat_id: $chat_id, text: $text, parse_mode: "HTML"}')
        curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" -d "$PAYLOAD" || true

    - name: 4️⃣ 安装编译依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          ccache jq build-essential clang flex bison g++ gawk gcc-multilib \
          g++-multilib gettext git libncurses-dev libssl-dev python3-distutils \
          rsync unzip zlib1g-dev swig libelf-dev

        echo "FILE_DATE=$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: 5️⃣ 准备 OpenWrt 配置
      run: |
        cd $GITHUB_WORKSPACE/openwrt

        # 使用仓库 config
        cp $GITHUB_WORKSPACE/${CONFIG_FILE} .config

        # DIY 1
        if [ -f "$GITHUB_WORKSPACE/$DIY_P1_SH" ]; then
            cp $GITHUB_WORKSPACE/$DIY_P1_SH .
            chmod +x $DIY_P1_SH
            ./$DIY_P1_SH
        fi

        # 更新 feeds
        ./scripts/feeds update -a
        ./scripts/feeds install -a

        # DIY 2
        if [ -f "$GITHUB_WORKSPACE/$DIY_P2_SH" ]; then
            cp $GITHUB_WORKSPACE/$DIY_P2_SH .
            chmod +x $DIY_P2_SH
            ./$DIY_P2_SH
        fi

        make defconfig

    - name: 6️⃣ 缓存加速
      uses: actions/cache@v4
      with:
        path: |
          openwrt/dl
          ~/.ccache
        key: ${{ runner.os }}-openwrt-x86_64-${{ hashFiles('custom_repo/.config') }}
        restore-keys: |
          ${{ runner.os }}-openwrt-x86_64-

    - name: 7️⃣ 编译固件
      id: compile
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 8️⃣ Telegram 结果通知
      if: always()
      run: |
        STATUS=$([[ "${{ steps.compile.outputs.status }}" == "success" ]] && echo "✅ 成功" || echo "❌ 失败")
        MSG="${STATUS} 🔗 <a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'>查看日志</a>"

        PAYLOAD=$(jq -n --arg chat_id "${TELEGRAM_CHAT_ID}" --arg text "$MSG" '{chat_id: $chat_id, text: $text, parse_mode: "HTML"}')
        curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" -d "$PAYLOAD" || true

    - name: 9️⃣ 上传固件
      if: steps.compile.outputs.status == 'success'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: OpenWrt_x86_64_${{ env.FILE_DATE }}
        files: openwrt/bin/targets/x86/64/*-generic-squashfs-combined-efi.img.gz
