name: OpenWrt-x86_64-CLEAN-BUILD

on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * *'

env:
  TZ: Asia/Shanghai
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 1️⃣ 拉取 OpenWrt
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: openwrt-25.12
          path: openwrt

      - name: 2️⃣ 拉取自定义文件
        uses: actions/checkout@v4
        with:
          path: custom_repo

      - name: 3️⃣ 安装构建依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gettext git \
            libncurses-dev libssl-dev rsync unzip zlib1g-dev swig libelf-dev ccache jq
          echo "FILE_DATE=$(date +'%Y%m%d%H%M')" >> $GITHUB_ENV

      - name: 4️⃣ 配置编译环境
        run: |
          cd openwrt
          # 清除可能冲突的预安装插件
          rm -rf package/luci-app-openclash package/luci-theme-argon package/luci-app-argon-config
          # 执行 diy-part1 (添加 src-git 源)
          bash $GITHUB_WORKSPACE/custom_repo/diy-part1.sh
          # 更新并安装所有 feeds
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          # 加载配置文件
          cp $GITHUB_WORKSPACE/custom_repo/.config .config
          # 执行 diy-part2 (自定义修改)
          bash $GITHUB_WORKSPACE/custom_repo/diy-part2.sh
          # 自动修复配置中的依赖关系（最关键步骤）
          make defconfig

      - name: 5️⃣ 编译固件
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: 6️⃣ 输出构建结果
        if: always()
        run: |
          ls -lh openwrt/bin/targets/x86/64/

      - name: 7️⃣ Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: CLEAN_25.12_${{ env.FILE_DATE }}
          files: openwrt/bin/targets/x86/64/*combined-efi.img.gz

      - name: 8️⃣ Telegram 通知
        if: always()
        run: |
          STATUS=$([[ "${{ job.status }}" == "success" ]] && echo "成功" || echo "失败")
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
          -d chat_id="${TELEGRAM_CHAT_ID}" \
          -d text="📦 OpenWrt 编译完成 | 状态：$STATUS | 时间：${{ env.FILE_DATE }}"
