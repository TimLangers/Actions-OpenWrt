name: OpenWrt-x86_64-Build

on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * *'

env:
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  TZ: Asia/Shanghai
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: 1️⃣ 拉取 OpenWrt
      uses: actions/checkout@v4
      with:
        repository: openwrt/openwrt
        ref: openwrt-25.12
        path: openwrt

    - name: 2️⃣ 拉取配置仓库
      uses: actions/checkout@v4
      with:
        path: custom_repo

    - name: 3️⃣ 安装依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          ccache jq build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses-dev \
          libssl-dev python3-distutils rsync unzip zlib1g-dev swig libelf-dev
        echo "FILE_DATE=$(date +'%Y%m%d%H%M')" >> $GITHUB_ENV

    - name: 4️⃣ Cache DL + CCache
      uses: actions/cache@v4
      with:
        path: |
          openwrt/dl
          ~/.ccache
          openwrt/staging_dir
        key: openwrt-x86_64-v2-${{ hashFiles('custom_repo/.config') }}
        restore-keys: |
          openwrt-x86_64-v2-

    - name: 5️⃣ 启用 ccache
      run: |
        ccache -M 5G
        ccache -z

    - name: 6️⃣ 准备配置
      run: |
        cd $GITHUB_WORKSPACE/openwrt
        
        # 1. 运行 DIY1 添加第三方源
        bash $GITHUB_WORKSPACE/custom_repo/diy-part1.sh
        
        # 2. 更新并安装所有 feeds
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
        # 3. 复制你的基础配置
        cp $GITHUB_WORKSPACE/custom_repo/.config .config
        
        # 4. 运行 DIY2 执行强行注入和修正
        bash $GITHUB_WORKSPACE/custom_repo/diy-part2.sh
        
        # 5. 生成最终配置 (自动补全依赖)
        make defconfig

    - name: 7️⃣ 编译（x86_64优化）
      id: compile
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 V=s
        ccache -s
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 8️⃣ 输出固件
      if: steps.compile.outputs.status == 'success'
      run: |
        ls -lh openwrt/bin/targets/x86/64/

    - name: 9️⃣ 上传 Release
      if: steps.compile.outputs.status == 'success'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: OpenWrt_x86_64_${{ env.FILE_DATE }}
        files: |
          openwrt/bin/targets/x86/64/*combined-efi.img.gz

    - name: 🔟 Telegram通知
      if: always()
      run: |
        STATUS=$([[ "${{ steps.compile.outputs.status }}" == "success" ]] && echo "✅ 成功" || echo "❌ 失败")
        curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
          -d chat_id="${TELEGRAM_CHAT_ID}" \
          -d text="$STATUS x86_64固件已构建完成"
