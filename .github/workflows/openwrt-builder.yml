name: OpenWrt-x86_64-CLEAN-BUILD

on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * *'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 1️⃣ 拉取源码
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: openwrt-25.12
          path: openwrt

      - name: 2️⃣ 拉取配置文件
        uses: actions/checkout@v4
        with:
          path: custom_repo

      - name: 3️⃣ 环境配置与下载 Feeds
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gettext git \
            libncurses-dev libssl-dev rsync unzip zlib1g-dev swig libelf-dev ccache jq
          
          cd openwrt
          rm -rf tmp/ feeds/
          
          # 使用 GitHub 镜像源，提升下载稳定性
          cat <<EOF > feeds.conf.default
          src-git packages https://github.com/openwrt/packages.git
          src-git routing https://github.com/openwrt/routing.git
          src-git telephony https://github.com/openwrt/telephony.git
          src-git luci https://github.com/openwrt/luci.git
          EOF
          
          # 循环重试更新，防止网络抖动导致的目录缺失
          echo "正在更新 Feeds..."
          for i in {1..3}; do
            ./scripts/feeds update -a && break || echo "第 $i 次更新失败，重试中..."
            sleep 5
          done
          
          # 校验核心目录
          if [ ! -d "feeds/luci" ]; then
            echo "::error:: feeds/luci 目录依然不存在，请检查网络！"
            exit 1
          fi
          
          ./scripts/feeds install -a
          
          # 准备配置
          cp $GITHUB_WORKSPACE/custom_repo/.config .config
          make defconfig

      - name: 4️⃣ 编译固件
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: 5️⃣ 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_Firmware
          path: openwrt/bin/targets/x86/64/*combined-efi.img.gz
