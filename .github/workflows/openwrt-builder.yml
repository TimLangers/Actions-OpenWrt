name: OpenWrt-x86_64-BASE-BUILD

on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * *'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 1️⃣ 拉取源码
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: openwrt-25.12
          path: openwrt

      - name: 2️⃣ 拉取配置文件
        uses: actions/checkout@v4
        with:
          path: custom_repo

      - name: 3️⃣ 环境配置
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gettext git \
            libncurses-dev libssl-dev rsync unzip zlib1g-dev swig libelf-dev ccache jq
          
          cd openwrt
          # 彻底清理环境
          rm -rf tmp/ feeds/
          
          # 创建简洁的 feeds.conf.default
          cat <<EOF > feeds.conf.default
          src-git packages https://git.openwrt.org/feed/packages.git
          src-git routing https://git.openwrt.org/feed/routing.git
          src-git telephony https://git.openwrt.org/feed/telephony.git
          src-git luci https://git.openwrt.org/feed/luci.git
          EOF
          
          # 仅安装基础包
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # 准备配置
          cp $GITHUB_WORKSPACE/custom_repo/.config .config
          make defconfig

      - name: 4️⃣ 编译固件
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: 5️⃣ 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_Firmware
          path: openwrt/bin/targets/x86/64/*combined-efi.img.gz
