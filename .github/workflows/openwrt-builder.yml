name: OpenWrt-x86_64-CLEAN-BUILD

on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * *'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 1️⃣ 深度磁盘清理（释放空间）
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/share/swift /usr/local/.ghcup
          sudo docker image prune --all --force
          df -h

      - name: 2️⃣ 拉取 OpenWrt 源码
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: openwrt-25.12
          path: openwrt

      - name: 3️⃣ 拉取自定义配置文件
        uses: actions/checkout@v4
        with:
          path: custom_repo

      - name: 4️⃣ 安装编译依赖 & 配置 Feeds
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gettext git \
            libncurses-dev libssl-dev rsync unzip zlib1g-dev swig libelf-dev ccache jq \
            file wget unzip python3 python3-pip

          cd openwrt

          # 清空可能残留的 feeds 目录（防止干扰）
          rm -rf tmp/ feeds/

          # 自定义 feeds.conf.default（添加 OpenClash 源）
          cat <<EOF > feeds.conf.default
          src-git packages https://github.com/openwrt/packages.git
          src-git routing https://github.com/openwrt/routing.git
          src-git telephony https://github.com/openwrt/telephony.git
          src-git luci https://github.com/openwrt/luci.git
          src-git openclash https://github.com/vernesong/OpenClash.git
          EOF

          # 循环更新 feeds（防止网络抖动）
          for i in {1..3}; do
            ./scripts/feeds update -a && break || { echo "第 $i 次更新失败，重试..."; sleep 5; }
          done

          # 校验关键目录是否存在
          if [ ! -d "feeds/luci" ]; then
            echo "::error:: feeds/luci 目录不存在，网络或源有问题！"
            exit 1
          fi

          ./scripts/feeds install -a

          # 复制自定义 .config（确保已移除 PassWall 并只保留 OpenClash）
          cp $GITHUB_WORKSPACE/custom_repo/.config .config

          # 强制确保 OpenClash 被选中（防止配置意外丢失）
          echo "CONFIG_PACKAGE_luci-app-openclash=y" >> .config

          # 生成最终配置（会自动处理依赖）
          make defconfig

      - name: 📢 TG 通知 (编译开始)
        if: always()
        run: |
          MSG="🚀 OpenWrt 编译开始%0A%0A📦 仓库: ${GITHUB_REPOSITORY}%0A🕒 时间: $(date '+%Y-%m-%d %H:%M:%S')"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="$MSG"

      - name: 5️⃣ 编译固件（带 ccache 加速）
        id: build
        run: |
          cd openwrt
          export CCACHE_DIR="$PWD/.ccache"
          export PATH="/usr/lib/ccache:$PATH"
          ccache -M 5G   # 限制最大 5G 缓存

          # 先下载所有源码包（避免编译中下载失败）
          make download -j$(nproc) || make download -j1

          # 正式编译，若失败则用单线程详情报错
          make -j$(nproc) || make -j1 V=s

      - name: 6️⃣ 上传固件（Artifact）
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_Firmware
          path: openwrt/bin/targets/x86/64/*combined-efi.img.gz

      - name: 📢 TG 通知 (编译结果)
        if: always()
        run: |
          STATUS=$([[ "${{ steps.build.conclusion }}" == "success" ]] && echo "✅ 编译成功" || echo "❌ 编译失败")
          MSG="${STATUS}%0A%0A📦 仓库: ${GITHUB_REPOSITORY}%0A🕒 时间: $(date '+%Y-%m-%d %H:%M:%S')%0A🔗 详情: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="$MSG"
