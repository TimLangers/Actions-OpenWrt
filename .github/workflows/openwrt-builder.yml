name: 编译 OpenWrt 最新版固件

on:
  workflow_dispatch:
  repository_dispatch:
  schedule:
    - cron: '0 12 * * *'

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: main
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: 1️⃣ 拉取当前源码仓库
      uses: actions/checkout@v4

    - name: ⏰ 准备编译时间标记
      run: |
        echo "FILE_DATE=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_ENV

    - name: 2️⃣ 准备环境与清理磁盘
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/share/swift /usr/lib/jvm /opt/pipx
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file qemu-utils upx-ucl fastjar libelf-dev swig python3-setuptools python3-pyelftools zstd jq libcap-dev binutils-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo mkdir -p /workdir && sudo chown $USER:$USER /workdir

    - name: 3️⃣ 创建 Swap 分区
      run: |
        sudo fallocate -l 6G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile

    - name: 4️⃣ 拉取 OpenWrt 源码
      working-directory: /workdir
      run: |
        git clone --depth 1 -b $REPO_BRANCH $REPO_URL openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: 5️⃣ 安装 Feeds 与执行脚本
      run: |
        cd openwrt
        [ -e $GITHUB_WORKSPACE/$FEEDS_CONF ] && cp $GITHUB_WORKSPACE/$FEEDS_CONF feeds.conf.default
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        chmod +x $GITHUB_WORKSPACE/$DIY_P1_SH $GITHUB_WORKSPACE/$DIY_P2_SH
        $GITHUB_WORKSPACE/$DIY_P1_SH
        [ -e $GITHUB_WORKSPACE/$CONFIG_FILE ] && cp $GITHUB_WORKSPACE/$CONFIG_FILE .config
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: 6️⃣ 生成配置并预下载依赖
      run: |
        cd openwrt
        make defconfig
        make download -j$(nproc)
        find dl -size -1024c -exec rm -f {} \;

    - name: 7️⃣ 核心编译步骤 (防报错优化)
      run: |
        cd openwrt
        # 强制清理可能冲突的工具链缓存
        make tools/libtool/clean
        # 严格串行编译工具链
        echo "编译工具链中..."
        make tools/install -j1
        make toolchain/install -j1
        # 并行编译固件
        echo "开始编译固件，并发线程数: $(nproc)"
        make -j$(nproc) || make -j1 V=s

    - name: 8️⃣ 整理固件产物
      run: |
        mkdir -p $GITHUB_WORKSPACE/firmware
        find openwrt/bin/targets/ -type f \( -name "*.img.gz" -o -name "*.vmdk" -o -name "*.qcow2" -o -name "*.manifest" -o -name "*.bin" -o -name "*.squashfs" \) -exec cp {} $GITHUB_WORKSPACE/firmware/ \;
        echo "FIRMWARE=$GITHUB_WORKSPACE/firmware" >> $GITHUB_ENV

    - name: 9️⃣ 上传至 Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt_firmware_${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: 🔟 发布 Release
      if: success()
      uses: softprops/action-gh-release@v2
      with:
        tag_name: OpenWrt_${{ env.FILE_DATE }}
        files: ${{ env.FIRMWARE }}/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
