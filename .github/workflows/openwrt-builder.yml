name: 编译 OpenWrt 最新版固件

on:
  workflow_dispatch:
  repository_dispatch:
  schedule:
    - cron: '0 12 * * *'

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: main
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: 1️⃣ 拉取源码
      uses: actions/checkout@v4

    - name: 2️⃣ 环境准备与收集信息
      run: |
        sudo apt-get update && sudo apt-get install -y build-essential clang flex bison gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file qemu-utils upx-ucl fastjar libelf-dev swig python3-setuptools python3-pyelftools zstd jq libcap-dev binutils-dev
        sudo mkdir -p /workdir && sudo chown $USER:$USER /workdir
        echo "CPU_MODEL=$(cat /proc/cpuinfo | grep 'model name' | head -1 | cut -f2 -d: | sed 's/^[ \t]*//')" >> $GITHUB_ENV
        echo "CPU_CORES=$(nproc)" >> $GITHUB_ENV
        echo "FILE_DATE=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_ENV

    - name: 3️⃣ 创建 Swap 分区
      run: |
        sudo swapoff -a || true
        sudo rm -f /swapfile
        sudo dd if=/dev/zero of=/swapfile bs=1M count=6144
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile

    - name: 4️⃣ 源码下载与配置
      working-directory: /workdir
      run: |
        git clone --depth 1 -b $REPO_BRANCH $REPO_URL openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
        cd openwrt
        ./scripts/feeds update -a && ./scripts/feeds install -a
        [ -e $GITHUB_WORKSPACE/$CONFIG_FILE ] && cp $GITHUB_WORKSPACE/$CONFIG_FILE .config
        make defconfig

    - name: 5️⃣ 发送【编译开始】通知
      run: |
        MSG="🚀 *OpenWrt 自动编译开始* %0A%0A📅 时间：$(date '+%Y-%m-%d %H:%M:%S')%0A🖥️ CPU：${{ env.CPU_MODEL }} (%{ env.CPU_CORES }}核)%0A📦 配置文件：${{ env.CONFIG_FILE }}%0A🌿 分支：${{ env.REPO_BRANCH }}%0A🔗 [点击查看进度](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
        curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage?chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=${MSG}&parse_mode=Markdown"

    - name: 6️⃣ 核心编译步骤
      id: compile
      run: |
        cd /workdir/openwrt
        make tools/libtool/clean
        make tools/install -j1
        make toolchain/install -j1
        if make -j$(nproc); then
          echo "status=success" >> $GITHUB_OUTPUT
        else
          echo "status=failure" >> $GITHUB_OUTPUT
          exit 1
        fi

    - name: 7️⃣ 整理产物
      if: always()
      run: |
        mkdir -p $GITHUB_WORKSPACE/firmware
        find /workdir/openwrt/bin/targets/ -type f \( -name "*.img.gz" -o -name "*.bin" \) -exec cp {} $GITHUB_WORKSPACE/firmware/ \;
        echo "FIRMWARE=$GITHUB_WORKSPACE/firmware" >> $GITHUB_ENV

    - name: 8️⃣ 发送【编译结果】通知
      if: always()
      run: |
        DEVICE=$(grep '^CONFIG_TARGET.*DEVICE.*=y' /workdir/openwrt/.config | sed -r 's/.*DEVICE_(.*)=y/\1/' || echo "未知设备")
        RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        if [ "${{ steps.compile.outputs.status }}" = "success" ]; then
          MSG="✅ *OpenWrt 自动编译成功！* %0A%0A📅 完成时间：$(date '+%Y-%m-%d %H:%M:%S')%0A📟 目标设备：${DEVICE}%0A🔗 [点击下载固件](https://github.com/${{ github.repository }}/releases/tag/OpenWrt_${{ env.FILE_DATE }})%0A⚠️ [详细日志](${RUN_URL})"
        else
          MSG="❌ *OpenWrt 自动编译失败！* %0A%0A📅 失败时间：$(date '+%Y-%m-%d %H:%M:%S')%0A📟 目标设备：${DEVICE}%0A⚠️ [点击此处查看错误日志](${RUN_URL})"
        fi
        curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage?chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=${MSG}&parse_mode=Markdown"

    - name: 9️⃣ 发布 Release
      if: success()
      uses: softprops/action-gh-release@v2
      with:
        tag_name: OpenWrt_${{ env.FILE_DATE }}
        files: ${{ env.FIRMWARE }}/*
        body: |
          🚀 OpenWrt Main 分支自动编译
          📅 编译时间: ${{ env.FILE_DATE }}
          📟 目标设备: ${{ env.DEVICE }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
